name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  rust:
    name: Rust Workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Configure Git auth for private core repository
        if: ${{ secrets.GIRL_AGENT_CORE_TOKEN != '' }}
        run: |
          git config --global url."https://x-access-token:${{ secrets.GIRL_AGENT_CORE_TOKEN }}@github.com/".insteadOf "https://github.com/"
      - name: Configure Cargo git fetch
        run: |
          mkdir -p ~/.cargo
          {
            echo "[net]"
            echo "git-fetch-with-cli = true"
          } >> ~/.cargo/config.toml
      - uses: Swatinem/rust-cache@v2
      - name: Check workspace
        run: cargo check --workspace

  web-console:
    name: Web Console
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false
      - name: Build console
        run: pnpm --dir apps/web/console build
