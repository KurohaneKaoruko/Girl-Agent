name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_full:
        description: "Run headless full verification (requires GIRL_AI_AGENT_PROVIDER_KEY)"
        type: boolean
        default: false
      run_abort:
        description: "Run headless full abort verification (requires GIRL_AI_AGENT_PROVIDER_KEY)"
        type: boolean
        default: false

jobs:
  rust:
    name: Rust Workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Configure Git auth for private core repository
        if: ${{ secrets.GIRL_AGENT_CORE_TOKEN != '' }}
        run: |
          git config --global url."https://x-access-token:${{ secrets.GIRL_AGENT_CORE_TOKEN }}@github.com/".insteadOf "https://github.com/"
      - name: Configure Cargo git fetch
        run: |
          mkdir -p ~/.cargo
          {
            echo "[net]"
            echo "git-fetch-with-cli = true"
          } >> ~/.cargo/config.toml
      - uses: Swatinem/rust-cache@v2
      - name: Check workspace
        run: cargo check --workspace

  web-console:
    name: Web Console
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false
      - name: Build console
        run: pnpm --dir apps/web/console build

  headless-verify:
    name: Headless Verify
    runs-on: ubuntu-latest
    env:
      GIRL_AI_AGENT_PROVIDER_KEY: ${{ secrets.GIRL_AI_AGENT_PROVIDER_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false
      - name: Ensure target directory
        run: mkdir -p target
      - name: Validate provider key for requested full checks
        if: ${{ github.event_name == 'workflow_dispatch' && (inputs.run_full || inputs.run_abort) && env.GIRL_AI_AGENT_PROVIDER_KEY == '' }}
        run: |
          echo "GIRL_AI_AGENT_PROVIDER_KEY secret is required for full checks." >&2
          exit 1
      - name: Verify headless smoke
        run: pwsh -NoProfile -Command "& './scripts/verify-headless.ps1' -Mode smoke -OutputJson './target/verify-headless-smoke.json'"
      - name: Verify headless full
        if: ${{ env.GIRL_AI_AGENT_PROVIDER_KEY != '' && (github.event_name != 'workflow_dispatch' || inputs.run_full || inputs.run_abort) }}
        run: pwsh -NoProfile -Command "& './scripts/verify-headless.ps1' -Mode full -OutputJson './target/verify-headless-full.json'"
      - name: Verify headless full abort
        if: ${{ env.GIRL_AI_AGENT_PROVIDER_KEY != '' && (github.event_name != 'workflow_dispatch' || inputs.run_abort) }}
        run: pwsh -NoProfile -Command "& './scripts/verify-headless.ps1' -Mode full -VerifyStreamAbort -OutputJson './target/verify-headless-full-abort.json'"
      - name: Generate verify summary
        if: always()
        run: node ./scripts/collect-verify-results.mjs
      - name: Upload headless verify artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: headless-verify-${{ github.run_id }}
          path: |
            target/verify-headless-smoke.json
            target/verify-headless-full.json
            target/verify-headless-full-abort.json
            target/verify-headless-summary.json
          if-no-files-found: warn

